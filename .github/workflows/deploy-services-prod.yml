name: Deploy Services to Production (Manual)

on:
  workflow_dispatch:
    inputs:
      api_tag:
        description: 'API image tag (e.g., 1347)'
        required: false
        type: string
      producer_tag:
        description: 'Producer image tag (e.g., 1343)'
        required: false
        type: string
      provider_tag:
        description: 'Provider image tag (e.g., 1344)'
        required: false
        type: string
      jobs_dashboard_tag:
        description: 'Jobs Dashboard image tag (e.g., 1350)'
        required: false
        type: string

jobs:
  update-tags:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sports-data-config repo
        uses: actions/checkout@v4
        with:
          repository: jrandallsexton/sports-data-config
          token: ${{ secrets.GH_PAT }}
          path: sports-data-config

      - name: Update API image tag
        if: ${{ inputs.api_tag != '' }}
        working-directory: sports-data-config
        run: |
          # Update or add image to api-patch.yaml
          if grep -q "image:" app/overlays/04_prod/api-patch.yaml; then
            sed -i "s|image: .*|image: sportdeets.azurecr.io/sportsdataapi:${{ inputs.api_tag }}|g" app/overlays/04_prod/api-patch.yaml
          else
            sed -i '/- name: api-all/a\        image: sportdeets.azurecr.io/sportsdataapi:${{ inputs.api_tag }}' app/overlays/04_prod/api-patch.yaml
          fi
          echo "Updated API to tag: ${{ inputs.api_tag }}"

      - name: Update Producer image tag
        if: ${{ inputs.producer_tag != '' }}
        working-directory: sports-data-config
        run: |
          TAG='${{ inputs.producer_tag }}'
          if [[ ! "$TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::producer_tag contains invalid characters: $TAG"
            exit 1
          fi
          # Update all producer role patch files (worker, ingest, api) for NCAA and NFL
          for patch in producer-patch.yaml producer-ingest-patch.yaml producer-api-patch.yaml producer-nfl-patch.yaml producer-nfl-ingest-patch.yaml producer-nfl-api-patch.yaml; do
            FILE="app/overlays/04_prod/$patch"
            if [ ! -f "$FILE" ]; then
              echo "::error::Missing producer patch file: $FILE"
              exit 1
            fi
            sed -i "s|image: .*sportsdataproducer.*|image: sportdeets.azurecr.io/sportsdataproducer:${TAG}|g" "$FILE"
            if ! grep -q "sportsdataproducer:${TAG}" "$FILE"; then
              echo "::error::Failed to update image tag in $FILE"
              exit 1
            fi
            echo "Updated $patch to tag: ${TAG}"
          done

      - name: Update Provider image tag
        if: ${{ inputs.provider_tag != '' }}
        working-directory: sports-data-config
        run: |
          TAG='${{ inputs.provider_tag }}'
          if [[ ! "$TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::provider_tag contains invalid characters: $TAG"
            exit 1
          fi
          # Update all provider role patch files (worker, ingest, api) for NCAA and NFL
          for patch in provider-patch.yaml provider-ingest-patch.yaml provider-api-patch.yaml provider-nfl-patch.yaml provider-nfl-ingest-patch.yaml provider-nfl-api-patch.yaml; do
            FILE="app/overlays/04_prod/$patch"
            if [ ! -f "$FILE" ]; then
              echo "::error::Missing provider patch file: $FILE"
              exit 1
            fi
            sed -i "s|image: .*sportsdataprovider.*|image: sportdeets.azurecr.io/sportsdataprovider:${TAG}|g" "$FILE"
            if ! grep -q "sportsdataprovider:${TAG}" "$FILE"; then
              echo "::error::Failed to update image tag in $FILE"
              exit 1
            fi
            echo "Updated $patch to tag: ${TAG}"
          done

      - name: Update Jobs Dashboard image tag
        if: ${{ inputs.jobs_dashboard_tag != '' }}
        working-directory: sports-data-config
        run: |
          TAG='${{ inputs.jobs_dashboard_tag }}'
          if [[ ! "$TAG" =~ ^[0-9]+$ ]]; then
            echo "::error::jobs_dashboard_tag must be a numeric build tag"
            exit 1
          fi
          # Update or add image to jobs-dashboard-patch.yaml
          if grep -q "image:" app/overlays/04_prod/jobs-dashboard-patch.yaml; then
            sed -i "s|image: .*|image: sportdeets.azurecr.io/sportsdatajobsdashboard:${TAG}|g" app/overlays/04_prod/jobs-dashboard-patch.yaml
          else
            sed -i '/- name: jobs-dashboard/a\        image: sportdeets.azurecr.io/sportsdatajobsdashboard:'"$TAG" app/overlays/04_prod/jobs-dashboard-patch.yaml
          fi
          echo "Updated Jobs Dashboard to tag: $TAG"

      - name: Commit and push changes
        working-directory: sports-data-config
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git add app/overlays/04_prod/*.yaml
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            COMMIT_MSG="Deploy to production:"
            [ -n "${{ inputs.api_tag }}" ] && COMMIT_MSG="$COMMIT_MSG API=${{ inputs.api_tag }}"
            [ -n "${{ inputs.producer_tag }}" ] && COMMIT_MSG="$COMMIT_MSG Producer=${{ inputs.producer_tag }}"
            [ -n "${{ inputs.provider_tag }}" ] && COMMIT_MSG="$COMMIT_MSG Provider=${{ inputs.provider_tag }}"
            [ -n "${{ inputs.jobs_dashboard_tag }}" ] && COMMIT_MSG="$COMMIT_MSG JobsDashboard=${{ inputs.jobs_dashboard_tag }}"
            
            git commit -m "$COMMIT_MSG"
            git push
            
            echo "✅ Changes committed to sports-data-config. Flux will deploy automatically."
          fi
