trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'src/UI/sd-ui/**'
    exclude:
      - 'src/SportsData.Core/**'

pr:
  branches:
    include:
      - main
  paths:
    include:
      - 'src/UI/sd-ui/**'
    exclude:
      - 'src/SportsData.Core/**'

# Centralized agent and demand config for all stages/jobs
pool:
  name: Default
  demands:
    - Agent.Name -equals Bender

resources:
  repositories:
  - repository: self
    type: git

variables:
- group: UI-Secrets
- name: dockerRegistryServiceConnection
  value: '805d6790-3b89-43f4-8551-f1a6b1c8f2f0'
- name: imageRepository
  value: 'sportsdataui'
- name: containerRegistry
  value: 'sportdeets.azurecr.io'
- name: dockerfilePath
  value: '$(Build.SourcesDirectory)/src/UI/sd-ui/Dockerfile'
- name: tag
  value: '$(Build.BuildId)'

stages:
  - stage: BuildAndTest
    displayName: 'Build & Test: UI'
    jobs:
      - job: BuildAndTest
        displayName: 'Build & Test: UI'
        steps:
          - task: NodeTool@0
            displayName: 'Use Node.js 20'
            inputs:
              versionSpec: '20.x'

          - script: |
              cd $(Build.SourcesDirectory)/src/UI/sd-ui
              npm ci
            displayName: 'Install dependencies'

          - script: |
              cd $(Build.SourcesDirectory)/src/UI/sd-ui
              npm run lint
            displayName: 'Run ESLint'

          - script: |
              cd $(Build.SourcesDirectory)/src/UI/sd-ui
              npm run build
            displayName: 'Build React app'
            env:
              REACT_APP_API_BASE_URL: https://api.sportdeets.com
              REACT_APP_ENVIRONMENT: production
              REACT_APP_PROD_URL: https://sportdeets.com

  # Jest/react-scripts tests. Runs on Node 18 (NOT 20): react-scripts@5 pulls
  # jest@27 -> jsdom@16 -> http-proxy-agent@4, which throws ERR_REQUIRE_ESM on
  # Node >=20. The lint+build stage above stays on Node 20 (build is unaffected).
  # Runs in parallel with BuildAndTest (dependsOn: []) and deliberately does NOT
  # gate the image push yet — the suite has never run in CI, so we surface its
  # status first and can make the push depend on it once it's trusted.
  - stage: Test
    displayName: 'Test: sd-ui'
    dependsOn: []
    jobs:
      - job: JestTest
        displayName: 'Jest test'
        steps:
          - task: NodeTool@0
            displayName: 'Use Node.js 18'
            inputs:
              versionSpec: '18.x'

          - script: |
              cd $(Build.SourcesDirectory)/src/UI/sd-ui
              npm ci
            displayName: 'Install dependencies'

          - script: |
              cd $(Build.SourcesDirectory)/src/UI/sd-ui
              npx react-scripts test --watchAll=false
            displayName: 'Run tests (react-scripts / jest)'
            env:
              CI: 'true'

  - stage: BuildImagePushACR
    displayName: 'Build UI Image & Push to ACR'
    dependsOn: BuildAndTest
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildImage
        displayName: 'Build and Push UI Image'
        steps:
          - task: Docker@2
            displayName: 'Build Image'
            inputs:
              command: build
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              containerRegistry: $(dockerRegistryServiceConnection)
              buildContext: '$(Build.SourcesDirectory)/src/UI/sd-ui'
              arguments: '--build-arg REACT_APP_API_BASE_URL=https://api.sportdeets.com --build-arg REACT_APP_ENVIRONMENT=production --build-arg REACT_APP_PROD_URL=https://sportdeets.com --build-arg REACT_APP_GOOGLE_MAPS_API_KEY=$(REACT_APP_GOOGLE_MAPS_API_KEY)'
              tags: |
                $(tag)
                latest
          
          - task: Docker@2
            displayName: 'Push Image'
            inputs:
              command: push
              repository: $(imageRepository)
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest
