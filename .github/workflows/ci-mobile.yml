name: CI — sd-mobile

on:
  pull_request:
    paths:
      - 'src/UI/sd-mobile/**'
  push:
    branches:
      - main
    paths:
      - 'src/UI/sd-mobile/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/UI/sd-mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/UI/sd-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npx jest --ci --coverage --forceExit
