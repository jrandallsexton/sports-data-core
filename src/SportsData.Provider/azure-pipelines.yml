trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'src/SportsData.Provider/**'
      - 'src/SportsData.Core/**'

pr:
  branches:
    include:
      - main
  paths:
    include:
      - 'src/SportsData.Provider/**'
      - 'src/SportsData.Core/**'

# Centralized agent and demand config for all stages/jobs
pool:
  name: Default
  demands:
    - Agent.Name -equals Bender

resources:
  - repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: '805d6790-3b89-43f4-8551-f1a6b1c8f2f0'
  imageRepository: 'sportsdataprovider'
  containerRegistry: 'sportdeets.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/src/DockerfileProvider'
  tag: '$(Build.BuildId)'

  # Build Solution Vars
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'
  Major: '0'
  Minor: '0'
  Patch: '1'
  PackageVersion: '0.0.1'

  # Deploy Vars
  azureSubscription: 'dev-sports-data-api-svc-conn'
  appName: 'provider-football-ncaa-dev'

stages:
- stage: BuildAndTest
  displayName: "Build & Test: Provider"
  jobs:
    - job: BuildAndTest
      displayName: BuildAndTest
      steps:
        - task: UseDotNet@2
          displayName: 'Use .NET 10 SDK'
          inputs:
            packageType: 'sdk'
            version: '10.0.x'
            includePreviewVersions: true

        - template: /build/templates/nuget-tool-install.yml

        # Use .NET SDK restore so NuGetAudit runs and NU1903 vulnerability
        # warnings escalate to errors (parity with local `dotnet build`).
        # Classic NuGetCommand@2 + MSBuild /t:Restore did not trigger the
        # audit, masking high-severity transitive vulnerabilities.
        - task: DotNetCoreCLI@2
          displayName: 'Restore (.NET SDK)'
          inputs:
            command: 'restore'
            projects: '**/sports-data-provider.sln'
            feedsToUse: 'select'
            vstsFeed: '2bb0cd0d-fa6e-42f0-9b7e-9cc1ce065e55/de94ed5a-8390-4547-bdd9-f975a712aa70'

        - task: DotNetCoreCLI@2
          displayName: 'Run Unit Tests'
          inputs:
            command: 'test'
            projects: '**/SportsData.Provider.Tests.Unit.csproj'
            arguments: '--collect:"XPlat Code Coverage"'
            publishTestResults: true
            testRunTitle: 'provider-tests-unit'
          continueOnError: false

        - task: PublishCodeCoverageResults@2
          displayName: 'Publish Code Coverage'
          inputs:
            summaryFileLocation: '$(Agent.TempDirectory)/**/coverage.cobertura.xml'
            failIfCoverageEmpty: false

- stage: BuildImagePushACR
  displayName: Build Image & Push to ACR
  dependsOn: BuildAndTest
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: BuildImage
    displayName: 'Build and Push Image'
    steps:
    - task: Docker@2
      displayName: 'Build & Push'
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest