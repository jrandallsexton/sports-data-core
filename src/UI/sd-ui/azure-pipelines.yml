trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'src/UI/sd-ui/**'
    exclude:
      - 'src/SportsData.Core/**'

pr:
  branches:
    include:
      - main
  paths:
    include:
      - 'src/UI/sd-ui/**'
    exclude:
      - 'src/SportsData.Core/**'

# Centralized agent and demand config for all stages/jobs
pool:
  name: Default
  demands:
    - Agent.Name -equals Bender

resources:
  repositories:
  - repository: self
    type: git

variables:
- group: UI-Secrets
- name: dockerRegistryServiceConnection
  value: '805d6790-3b89-43f4-8551-f1a6b1c8f2f0'
- name: imageRepository
  value: 'sportsdataui'
- name: containerRegistry
  value: 'sportdeets.azurecr.io'
- name: dockerfilePath
  value: '$(Build.SourcesDirectory)/src/UI/sd-ui/Dockerfile'
- name: tag
  value: '$(Build.BuildId)'

stages:
  - stage: BuildAndTest
    displayName: 'Build & Test: UI'
    jobs:
      - job: BuildAndTest
        displayName: 'Build & Test: UI'
        steps:
          - task: NodeTool@0
            displayName: 'Use Node.js 20'
            inputs:
              versionSpec: '20.x'

          - script: |
              cd $(Build.SourcesDirectory)/src/UI/sd-ui
              npm ci --legacy-peer-deps
            displayName: 'Install dependencies'

          - script: |
              cd $(Build.SourcesDirectory)/src/UI/sd-ui
              npm run lint
            displayName: 'Run ESLint'

          - script: |
              cd $(Build.SourcesDirectory)/src/UI/sd-ui
              npm run build
            displayName: 'Build React app'
            env:
              REACT_APP_API_BASE_URL: https://api.sportdeets.com
              REACT_APP_ENVIRONMENT: production
              REACT_APP_PROD_URL: https://sportdeets.com

  # Vitest suite. The app is on React 19 + react-router 7, which react-scripts@5
  # / jest 27 can't test (jest's resolver chokes on RRD7's exports map, and
  # jsdom 16's http-proxy-agent breaks require() on modern Node). Vitest handles
  # all of that natively on Node 20. --legacy-peer-deps is required for install
  # (React 19 vs react-scripts@5's React 18 peer). Runs in parallel with
  # BuildAndTest and now gates the image push (see BuildImagePushACR.dependsOn).
  - stage: Test
    displayName: 'Test: sd-ui'
    dependsOn: []
    jobs:
      - job: VitestTest
        displayName: 'Vitest'
        steps:
          - task: NodeTool@0
            displayName: 'Use Node.js 20'
            inputs:
              versionSpec: '20.x'

          - script: |
              cd $(Build.SourcesDirectory)/src/UI/sd-ui
              npm ci --legacy-peer-deps
            displayName: 'Install dependencies'

          - script: |
              cd $(Build.SourcesDirectory)/src/UI/sd-ui
              npx vitest run
            displayName: 'Run tests (vitest)'
            env:
              CI: 'true'

  - stage: BuildImagePushACR
    displayName: 'Build UI Image & Push to ACR'
    dependsOn:
      - BuildAndTest
      - Test
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildImage
        displayName: 'Build and Push UI Image'
        steps:
          - task: Docker@2
            displayName: 'Build Image'
            inputs:
              command: build
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              containerRegistry: $(dockerRegistryServiceConnection)
              buildContext: '$(Build.SourcesDirectory)/src/UI/sd-ui'
              arguments: '--build-arg REACT_APP_API_BASE_URL=https://api.sportdeets.com --build-arg REACT_APP_ENVIRONMENT=production --build-arg REACT_APP_PROD_URL=https://sportdeets.com --build-arg REACT_APP_GOOGLE_MAPS_API_KEY=$(REACT_APP_GOOGLE_MAPS_API_KEY)'
              tags: |
                $(tag)
                latest
          
          - task: Docker@2
            displayName: 'Push Image'
            inputs:
              command: push
              repository: $(imageRepository)
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest
